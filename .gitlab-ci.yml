stages:
  - test

variables:
  GO_VERSION: "1.26"

# v2 is built layer by layer (model → source → compiler → engine → plan). The web
# UI and its go:embed land in the representations layer; until then CI is Go-only.

go:build:
  stage: test
  image: golang:${GO_VERSION}
  script:
    - go build ./...

go:vet:
  stage: test
  image: golang:${GO_VERSION}
  script:
    - go vet ./...

go:test:
  stage: test
  image: golang:${GO_VERSION}
  script:
    - go test ./...

lint:
  stage: test
  image: golangci/golangci-lint:latest
  allow_failure: true
  script:
    - golangci-lint run ./...
